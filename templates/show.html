<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Contacts Page</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}">
    <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.min.js' %}"></script>
</head>
<body>
    <h1 class = "text-center">Contacts</h1>
    <p>Below is a list of all contacts, including their details and information</p>
    <ul>
        <table class = "table table-striped table-hover">

            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Subjects</th>
                <th>Message</th>
                <th>Action</th>
            </tr>

        {% for contact in all %}
        <tr>

            <td>{{ contact.name }}</td>
            <td>{{ contact.email }}</td>
            <td>{{ contact.subjects }}</td>
            <td>{{ contact.message }}</td>
            <td>
                <a href= "/edit/{{ contact.id }}" class="btn btn-success">Edit</a>
                <a href= "/delete/{{ contact.id }}" class="btn btn-danger">Delete</a>
            </td>
        </tr>
       {% endfor %}
        </table>
        
    </ul>
</body>
</html>
