<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            color: var(--text);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.15);
            padding: 32px;
        }

        .brand {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--accent);
        }

        .subtitle {
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 8px;
        }

        .btn:hover {
            background: var(--accent-dark);
        }

        .switch {
            text-align: center;
            margin-top: 16px;
            color: var(--muted);
            font-size: 14px;
        }

        .switch a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .errorlist {
            padding: 0;
            list-style: none;
            color: #dc2626;
            font-size: 13px;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .auth-card { padding: 24px; }
            .brand { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="brand">Welcome Back</h2>
        <p class="subtitle">Sign in to continue to your account.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}

            <div class="form-group">
                <label for="id_username">Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                {{ form.password }}
            </div>

            <button class="btn" type="submit">Log In</button>
        </form>

        <p class="switch">Don’t have an account? <a href="{% url 'register' %}">Create one</a></p>
    </div>
</body>
</html>
